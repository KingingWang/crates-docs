# Crates Docs MCP 服务器配置示例

[server]
# 服务器名称
name = "crates-docs"
# 服务器版本（默认使用 Cargo.toml 中的版本）
# version = "0.5.3"
# 服务器描述
description = "高性能 Rust crate 文档查询 MCP 服务器"
# 监听主机
# 容器部署时建议使用 0.0.0.0，对外暴露服务；本地仅自用可改回 127.0.0.1
host = "0.0.0.0"
# 监听端口
port = 8080
# 传输模式: stdio, http, sse, hybrid
transport_mode = "hybrid"
# 启用 SSE 支持
enable_sse = true
# 启用 OAuth 认证
enable_oauth = false
# 最大并发连接数
max_connections = 100
# 请求超时时间（秒）
request_timeout_secs = 30
# 响应超时时间（秒）
response_timeout_secs = 60

# 安全配置
# 允许的主机列表 (Host 请求头验证)
# 容器/反向代理部署时请按需补充实际域名或服务名
allowed_hosts = ["localhost", "127.0.0.1", "0.0.0.0"]

# 允许的来源列表 (CORS)
# 开发环境可使用通配符模式，生产环境请指定具体域名
# 示例: allowed_origins = ["https://your-domain.com"]
# 注意: 使用 "*" 会允许所有来源，存在安全风险
allowed_origins = ["http://localhost:*"]

[cache]
# 缓存类型: memory, redis
cache_type = "memory"
# 内存缓存大小（条目数）
memory_size = 1000
# Redis 连接 URL（仅当 cache_type = "redis" 时使用）
# redis_url = "redis://localhost:6379"
# 默认缓存时间（秒）
default_ttl = 3600
# crate 文档缓存 TTL（秒），默认 1 小时
crate_docs_ttl_secs = 3600
# 项目文档缓存 TTL（秒），默认 30 分钟
item_docs_ttl_secs = 1800
# 搜索结果缓存 TTL（秒），默认 5 分钟
search_results_ttl_secs = 300

[oauth]
# 是否启用 OAuth
enabled = false
# OAuth 客户端 ID
# client_id = "your-client-id"
# OAuth 客户端密钥
# client_secret = "your-client-secret"
# 重定向 URI
# redirect_uri = "http://localhost:8080/oauth/callback"
# 授权端点
# authorization_endpoint = "https://provider.com/oauth/authorize"
# 令牌端点
# token_endpoint = "https://provider.com/oauth/token"
# 授权范围
scopes = ["openid", "profile", "email"]
# OAuth 提供者: Custom, GitHub, Google, Keycloak
provider = "Custom"

# GitHub OAuth 示例配置
# [oauth]
# enabled = true
# client_id = "github-client-id"
# client_secret = "github-client-secret"
# redirect_uri = "http://localhost:8080/oauth/callback"
# authorization_endpoint = "https://github.com/login/oauth/authorize"
# token_endpoint = "https://github.com/login/oauth/access_token"
# scopes = ["read:user", "user:email"]
# provider = "GitHub"

# Google OAuth 示例配置
# [oauth]
# enabled = true
# client_id = "google-client-id"
# client_secret = "google-client-secret"
# redirect_uri = "http://localhost:8080/oauth/callback"
# authorization_endpoint = "https://accounts.google.com/o/oauth2/v2/auth"
# token_endpoint = "https://oauth2.googleapis.com/token"
# scopes = ["openid", "https://www.googleapis.com/auth/userinfo.profile", "https://www.googleapis.com/auth/userinfo.email"]
# provider = "Google"

# Keycloak OAuth 示例配置
# [oauth]
# enabled = true
# client_id = "keycloak-client-id"
# client_secret = "keycloak-client-secret"
# redirect_uri = "http://localhost:8080/oauth/callback"
# authorization_endpoint = "https://keycloak.example.com/realms/myrealm/protocol/openid-connect/auth"
# token_endpoint = "https://keycloak.example.com/realms/myrealm/protocol/openid-connect/token"
# scopes = ["openid", "profile", "email"]
# provider = "Keycloak"

# API Key 认证配置
# 注意：需要启用 api-key feature 才能使用此功能
# [api_key]
# # 是否启用 API Key 认证
# enabled = true
# # 有效的 API Key 哈希列表（Argon2 PHC 格式）
# # 不要在配置文件中存储明文 key；请使用 `crates-docs generate-api-key`
# # 生成一次性明文 key，并将输出的 hash 保存到这里
# keys = ["$argon2id$v=19$m=47104,t=1,p=1$replace$with_generated_hash"]
# # API Key 请求头名称
# header_name = "X-API-Key"
# # API Key 查询参数名称（不推荐使用，安全性较低）
# query_param_name = "api_key"
# # 是否允许通过查询参数传递 API Key（默认 false）
# allow_query_param = false
# # API Key 前缀（用于生成和校验结构化 key）
# key_prefix = "sk"

[logging]
# 日志级别: trace, debug, info, warn, error
level = "info"
# 日志文件路径（enable_file = true 时生效）
file_path = "./logs/crates-docs.log"
# 是否启用控制台日志
enable_console = true
# 是否启用文件日志（默认 false，仅控制台输出）
enable_file = false
# 日志文件最大大小（MB）
max_file_size_mb = 100
# 保留的日志文件数量
max_files = 10

[performance]
# HTTP 客户端连接池大小
http_client_pool_size = 10
# HTTP 客户端连接池空闲超时时间（秒）
http_client_pool_idle_timeout_secs = 90
# HTTP 客户端连接超时时间（秒）
http_client_connect_timeout_secs = 10
# HTTP 客户端请求超时时间（秒）
http_client_timeout_secs = 30
# HTTP 客户端读取超时时间（秒）
http_client_read_timeout_secs = 30
# HTTP 客户端最大重试次数
http_client_max_retries = 3
# HTTP 客户端重试初始延迟（毫秒）
http_client_retry_initial_delay_ms = 100
# HTTP 客户端重试最大延迟（毫秒）
http_client_retry_max_delay_ms = 10000
# 缓存最大大小（条目数）
cache_max_size = 1000
# 缓存默认 TTL（秒）
cache_default_ttl_secs = 3600
# 请求速率限制（每秒请求数）
rate_limit_per_second = 100
# 并发请求限制
concurrent_request_limit = 50
# 启用响应压缩
enable_response_compression = true
# 启用 Prometheus 指标收集
enable_metrics = true
# 指标服务端口号（0 表示使用服务器端口）
metrics_port = 0

# ============================================================================
# 环境变量配置（适用于 Docker 部署）
# ============================================================================
#
# 以下环境变量可以覆盖配置文件中的设置，优先级：环境变量 > CLI 配置文件 > 默认值
#
# API Key 认证环境变量：
#   CRATES_DOCS_API_KEY_ENABLED=true                    # 启用 API Key 认证
#   CRATES_DOCS_API_KEYS=$argon2id$...,$argon2id$...   # API Key 哈希列表（逗号分隔）
#   CRATES_DOCS_API_KEY_HEADER=X-API-Key                # API Key 请求头名称
#   CRATES_DOCS_API_KEY_QUERY_PARAM_NAME=api_key        # API Key 查询参数名称
#   CRATES_DOCS_API_KEY_ALLOW_QUERY=false               # 是否允许查询参数传递
#   CRATES_DOCS_API_KEY_PREFIX=sk                       # API Key 前缀
#
# 先生成 key：
#   crates-docs generate-api-key --prefix sk
#
# Docker 部署示例：
#   docker run -d \
#     -p 8080:8080 \
#     -e CRATES_DOCS_API_KEY_ENABLED=true \
#     -e CRATES_DOCS_API_KEYS='$argon2id$...generated_hash...' \
#     crates-docs:latest
#
# Docker Compose 示例：
#   services:
#     crates-docs:
#       image: crates-docs:latest
#       ports:
#         - "8080:8080"
#       environment:
#         - CRATES_DOCS_API_KEY_ENABLED=true
#         - CRATES_DOCS_API_KEYS=$argon2id$...generated_hash...
#         - CRATES_DOCS_HOST=0.0.0.0
#         - CRATES_DOCS_PORT=8080
#
# CLI 参数示例：
#   crates-docs serve \
#     --enable-api-key \
#     --api-keys '$argon2id$...generated_hash...' \
#     --api-key-header "X-API-Key"
#
# ============================================================================
