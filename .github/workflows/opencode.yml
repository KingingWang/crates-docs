name: OpenCode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

env:
  ALLOWED_USERS: "KingingWang"

jobs:
  opencode:
    if: |
      (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode')) &&
      contains(env.ALLOWED_USERS, github.event.comment.user.login)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
      discussions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: true
          token: ${{ secrets.PAT_TOKEN }}

      - name: Debug Token
        run: |
          echo "Token is set: ${{ secrets.PAT_TOKEN != '' }}"
          echo "Token length: ${{ secrets.PAT_TOKEN != '' && 'set' || 'not set' }}"

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        with:
          model: opencode/qwen3.6-plus-free
          use_github_token: true
